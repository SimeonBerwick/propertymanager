name: Property Manager DB CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/property-manager-playwright.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/property-manager-playwright.yml'

concurrency:
  group: property-manager-db-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-backed-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: propertymanager_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d propertymanager_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: apps/web
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/propertymanager_ci?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/propertymanager_ci?schema=test
      SESSION_SECRET: ci-session-secret-2026-abcdefghijklmnopqrstuvwxyz
      LANDLORD_EMAIL: landlord@example.com
      LANDLORD_PASSWORD: changeme
      LANDLORD_SLUG: landlord
      NOTIFY_TRANSPORT: log
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare database
        run: |
          npm run prisma:generate
          npx prisma db push --force-reset --skip-generate
          npm run prisma:seed

      - name: Install Playwright Chromium
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright install --with-deps chromium

      - name: Run unit + integration tests
        run: npm test

      - name: Run Playwright browser workflow
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: property-manager-playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
