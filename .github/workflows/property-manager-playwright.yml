name: Property Manager Playwright

on:
  push:
    paths:
      - 'apps/web/**'
      - 'README.md'
      - 'JEFF_TEST_GATE.md'
      - '.github/workflows/property-manager-playwright.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'README.md'
      - 'JEFF_TEST_GATE.md'
      - '.github/workflows/property-manager-playwright.yml'

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: propertymanager_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d propertymanager_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: apps/web
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/propertymanager_ci?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/propertymanager_ci?schema=test
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/propertymanager_ci?schema=e2e
      SESSION_SECRET: ci-session-secret-2026-abcdefghijklmnopqrstuvwxyz
      LANDLORD_EMAIL: landlord@example.com
      LANDLORD_PASSWORD: changeme
      LANDLORD_SLUG: landlord
      NOTIFY_TRANSPORT: log
      SMS_TRANSPORT: log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare app database
        run: npm run setup:local

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit + integration tests
        run: npm test

      - name: Run Playwright browser workflow
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-manager-playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
